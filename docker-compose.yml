services:
  postgres:
    image: postgres:16-alpine
    container_name: iam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iam_secret}
      POSTGRES_DB: ${POSTGRES_DB:-iam}
    ports:
      # Published on 5433 to avoid colliding with a native Postgres on 5432.
      # In-compose services still reach it as postgres:5432.
      - '5433:5432'
    volumes:
      - iam_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-iam} -d ${POSTGRES_DB:-iam}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iam-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-iam}:${POSTGRES_PASSWORD:-iam_secret}@postgres:5432/${POSTGRES_DB:-iam}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      GRAPHQL_PLAYGROUND: ${GRAPHQL_PLAYGROUND:-true}
      GRAPHQL_DEBUG: ${GRAPHQL_DEBUG:-false}
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  iam_pgdata:
